name: PR Review

on:
  pull_request:
    paths:
      - 'daily-tech-logs/*.md'

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Identify changed markdown files
        id: changed
        run: |
          files=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep '^daily-tech-logs/.*\\.md$' || true)
          echo "files=$files" >> $GITHUB_OUTPUT
      - name: Review with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.changed.outputs.files != ''
        run: |
          if [ -z "$GEMINI_API_KEY" ] || [ -z "$GITHUB_TOKEN" ]; then
            echo 'Missing secrets; skipping LLM review.'
            exit 0
          fi
          echo "Would review files: ${steps.changed.outputs.files}"
