spring:
  application:
    name: daily-tech-logs
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:.data/db.sqlite
  jackson:
    time-zone: Asia/Seoul

slack:
  bot-token: ${SLACK_BOT_TOKEN:}
  signing-secret: ${SLACK_SIGNING_SECRET:}
  channel-id: ${CHANNEL_ID:}

github:
  owner: ${GITHUB_OWNER:}
  repo: ${GITHUB_REPO:}
  default-branch: ${GITHUB_DEFAULT_BRANCH:develop}
  token: ${GITHUB_TOKEN:}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model-keywords: ${LLM_MODEL_KEYWORDS:gemini-1.5-flash}
  model-pr-review: ${LLM_MODEL_PR_REVIEW:gemini-1.5-flash}
  daily-call-cap: ${LLM_DAILY_CALL_CAP:50}

tavily:
  api-key: ${TAVILY_API_KEY:}
  allowed-sites: ${ALLOWED_SITES:}
  days-limit: ${DAYS_LIMIT:1460}
  lang-threshold: ${LANG_THRESHOLD:0.9}
